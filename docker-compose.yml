version: "3.3"

services:
  # Infrastructure
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vrip_admin
      POSTGRES_PASSWORD: vrip_password_secure_123
      POSTGRES_DB: vrip_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # MCP Layer
  mcp-gateway:
    build:
      context: .
      dockerfile: services/mcp-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mcp-postgres
      - mcp-qdrant

  mcp-postgres:
    build:
      context: .
      dockerfile: services/mcp-postgres/Dockerfile
    env_file: .env
    depends_on:
      - postgres

  mcp-qdrant:
    build:
      context: .
      dockerfile: services/mcp-qdrant/Dockerfile
    env_file: .env
    depends_on:
      - qdrant

  # Intelligence Layer
  agent-service:
    build:
      context: .
      dockerfile: services/agent-service/Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - mcp-gateway

  # Public API
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - agent-service

  # Dashboard
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  qdrant_data:
